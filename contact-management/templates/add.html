{% extends 'base.html' %}

{% block styles %}
<style>
    .form-container {
        background-color: var(--surface-color);
        border-radius: 0.5rem;
        padding: 2rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        max-width: 600px;
        margin: 0 auto;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-main);
    }

    .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        font-size: 1rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add New Contact</h1>
    <a href="{{ url_for('index') }}" class="btn btn-outline">Back to List</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add') }}">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="+1 (555) 000-0000">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Contact</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
